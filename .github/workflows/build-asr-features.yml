name: Build ASR Features

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version tag to build and upload to its GitHub Release, for example v0.1.0"
        required: false
        type: string
  push:
    tags:
      - "v*"
      - "[0-9]*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    shell: bash

jobs:
  binary:
    name: Build Linux binary
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install bundled FFmpeg build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang nasm pkg-config

      - name: Build release binary
        run: |
          cargo build \
            --release \
            --locked \
            --manifest-path rust/Cargo.toml \
            --bin asr-features \
            --features cli,bundled-ffmpeg

      - name: Package binary
        run: |
          mkdir -p dist
          tar -C rust/target/release \
            -czf dist/asr-features-x86_64-unknown-linux-gnu.tar.gz \
            asr-features

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: asr-features-x86_64-unknown-linux-gnu
          path: dist/asr-features-x86_64-unknown-linux-gnu.tar.gz
          if-no-files-found: error

  wheel:
    name: Build Python 3.10+ wheel (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux
            runner: ubuntu-latest
          - name: windows
            runner: windows-latest
          - name: macos
            runner: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install maturin
        run: python -m pip install --upgrade "maturin>=1.9,<2"

      - name: Build abi3 wheel with Python feature
        working-directory: rust
        run: |
          python -m maturin build \
            --release \
            --locked \
            --features python \
            --out ../dist/wheels

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: asr-features-${{ matrix.platform.name }}-python310-plus-wheel
          path: dist/wheels/*.whl
          if-no-files-found: error

  release:
    name: Upload artifacts to version release
    needs:
      - binary
      - wheel
    runs-on: ubuntu-latest
    if: >-
      github.ref_type == 'tag' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')
    permissions:
      contents: write

    steps:
      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: asr-features-x86_64-unknown-linux-gnu
          path: release-assets

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: asr-features-*-python310-plus-wheel
          path: release-assets
          merge-multiple: true

      - name: Resolve release tag
        id: release
        env:
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ -n "$DISPATCH_VERSION" ]; then
            echo "tag=$DISPATCH_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          files: release-assets/*
          fail_on_unmatched_files: true
