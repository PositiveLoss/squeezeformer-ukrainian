[project]
name = "squeezeformer-pytorch"
version = "0.1.0"
description = "PyTorch implementation of the Squeezeformer encoder"
requires-python = ">=3.14"
dependencies = [
    "huggingface-hub>=0.34.0",
    "jiwer>=4.0.0",
    "nvidia-npp>=13.1.0.44",
    "polars>=1.30.0",
    "sentencepiece>=0.2.0",
    "torch>=2.11.0",
    "torchaudio>=2.11.0",
    "torchcodec>=0.11.0",
    "trackio>=0.20.2",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py314"

[tool.ruff.lint]
select = ["E", "F", "I"]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "ruff>=0.15.8",
]
